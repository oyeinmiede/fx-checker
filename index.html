<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | FX Checker</title>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <img src="./assets/images/logo.svg" alt="FX Checker" class="logo" />
        <div class="header-meta">
          <span class="currency-count">55</span>
          <span>Currencies</span>
          <span>•</span>
          <span>EOD</span>
          <span>•</span>
          <span>ECB Data</span>
        </div>
      </header>

      <section class="ticker">
        <span class="ticker-label"><span class="dot"></span> Live Markets</span>
        <div class="ticker-track">
          <div class="ticker-item">
            <span class="currency-pair">USD/JPY</span>
            <span>157.91</span>
            <span class="positive">▲ +0.04%</span>
          </div>
          <div class="ticker-item">
            <span class="currency-pair">GBP/USD</span>
            <span>1.3575</span>
            <span class="negative">▼ -0.22%</span>
          </div>
        </div>
      </section>

      <main class="dashboard">
        <section class="converter">
          <div class="converter-header">
            <h1>Check The Rate</h1>
          </div>

          <div class="converter-body">
            <div class="groups">
              <div class="currency-group">
                <label for="send-amount"> Send </label>
                <div class="conversion-container">
                  <input
                    class="amount-input"
                    id="send-amount"
                    type="number"
                    value="1000"
                  />
                  <button class="currency-btn">
                    <img
                      class="flag"
                      src="./assets/images/flags/us.webp"
                      alt=""
                    />
                    USD
                    <img
                      src="./assets/images/icon-chevron-down.svg"
                      alt=""
                      class="icon"
                    />
                  </button>
                </div>
              </div>
              <button class="swap-btn">
                <img src="./assets/images/icon-exchange.svg" alt="" />
              </button>
              <div class="currency-group">
                <label> Receive </label>
                <div class="conversion-container">
                  <div class="receive-amount">0.00</div>
                  <button class="currency-btn">
                    <img
                      class="flag"
                      src="./assets/images/flags/eu.webp"
                      alt=""
                    />
                    EUR
                    <img
                      src="./assets/images/icon-chevron-down.svg"
                      alt=""
                      class="icon"
                    />
                  </button>
                </div>
              </div>
            </div>
            <div class="bottom-conversion">
              <p class="exchange-rate">1 USD = 0.8530 EUR</p>

              <div class="converter-actions">
                <button class="favorite">
                  <img src="./assets/images/icon-star.svg" alt="" />
                  Favorite
                </button>
                <button class="log">Log Conversion</button>
              </div>
            </div>
          </div>
          <div class="currency-picker hidden">
            <div class="picker-header">
              <h2>Select Currency</h2>
              <button class="close-picker">✕</button>
            </div>
            <input
              class="currency-search"
              type="text"
              placeholder="Search currencies..."
            />
            <div class="currency-list"></div>
          </div>
        </section>
        <section class="tabs-section">
          <div class="tabs">
            <button class="tab active">History</button>
            <button class="tab">Compare</button>
            <button class="tab">Favorites <span class="count fav-count"></span></button>
            <button class="tab">Log <span class="count log-count"></span></button>
          </div>

          <div class="tab-panel history-panel">
            <div class="history-header">
              <div class="stats-grid">
                <article class="stat-card">
                  <span>Open</span>
                  <h3 class="open-value">0.0000</h3>
                </article>
                <article class="stat-card">
                  <span>Last</span>
                  <h3 class="last-value">0.0000</h3>
                </article>
                <article class="stat-card">
                  <span>Change</span>
                  <h3 class="change-value">+0.0000</h3>
                </article>
                <article class="stat-card">
                  <span>% Change</span>
                  <h3 class="percent-change-value">▲ +0.00%</h3>
                </article>
              </div>

              <div class="range-selector">
                <button>1D</button>
                <button>1W</button>
                <button class="active">1M</button>
                <button>3M</button>
                <button>1Y</button>
                <button>5Y</button>
              </div>
            </div>

            <div class="chart-container">
              <div class="chart-meta">
                <h3 class="chart-pair"></h3>
                <p class="chart-rate"></p>
              </div>
              <canvas id="history-chart"></canvas>
            </div>
          </div>

          <div class="tab-panel compare-panel hidden"></div>

          <div class="tab-panel favorites-panel hidden">
            <div class="panel-header">
              <h2>Pinned Pairs</h2>
              <p><span class="favorite-count">0</span> favorites</p>
            </div>
            <div class="favorites-container"></div>
          </div>

          <div class="tab-panel log-panel hidden">
            <div class="panel-header">
              <h2>Conversion Log</h2>
              <div>
                <p><span class="logged-count">0</span> Logged</p>
                <button>Clear All</button>
              </div>
            </div>
            <div class="log-container"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
