<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | FX Checker</title>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <img src="./assets/images/logo.svg" alt="FX Checker" class="logo" />
        <div class="header-meta">
          <span class="currency-count">55</span>
          <span>Currencies</span>
          <span>•</span>
          <span>EOD</span>
          <span>•</span>
          <span>ECB Data</span>
        </div>
      </header>

      <section class="ticker">
        <span class="ticker-label"><span class="dot"></span> Live Markets</span>
        <div class="ticker-track">
          <div class="ticker-item">
            <span class="currency-pair">USD/JPY</span>
            <span>157.91</span>
            <span class="positive">▲ +0.04%</span>
          </div>
          <div class="ticker-item">
            <span class="currency-pair">GBP/USD</span>
            <span>1.3575</span>
            <span class="negative">▼ -0.22%</span>
          </div>
        </div>
      </section>

      <main class="dashboard">
        <section class="converter">
          <div class="converter-header">
            <h1>Check The Rate</h1>
          </div>

          <div class="converter-body">
            <div class="groups">
              <div class="currency-group">
                <label for="send-amount"> Send </label>
                <div class="conversion-container">
                  <input id="send-amount" type="number" value="1000" />
                  <button class="currency-btn"><img class="flag" src="./assets/images/flags/us.webp" alt=""> USD <img src="./assets/images/icon-chevron-down.svg" alt="" class="icon"></button>
                </div>
              </div>
              <button class="swap-btn"><img src="./assets/images/icon-exchange.svg" alt=""></button>
              <div class="currency-group">
                <label> Receive </label>
                <div class="conversion-container">
                  <div class="receive-amount">853.00</div>
                  <button class="currency-btn"><img class="flag" src="./assets/images/flags/eu.webp" alt=""> EUR <img src="./assets/images/icon-chevron-down.svg" alt="" class="icon"></button>
                </div>
              </div>
            </div>
            <div class="bottom-conversion">
              <p class="exchange-rate">1 USD = 0.8530 EUR</p>

              <div class="converter-actions">
                <button class="favorite"><img src="./assets/images/icon-star-filled.svg" alt=""> Favorited</button>
                <button class="log">Log Conversion</button>
              </div>
            </div>
          </div>
        </section>
        <section class="tabs-section">
          <div class="tabs">
            <button class="tab active">History</button>
            <button class="tab">Compare</button>
            <button class="tab">Favorites <span class="count">10</span></button>
            <button class="tab">Log <span class="count">8</span></button>
          </div>

          <div class="tab-panel history-panel">
            <div class="history-header">
              <div class="stats-grid">
                <article class="stat-card">
                  <span>Open</span>
                  <h3>0.8421</h3>
                </article>
                <article class="stat-card">
                  <span>Last</span>
                  <h3>0.8530</h3>
                </article>
                <article class="stat-card">
                  <span>Change</span>
                  <h3 class="positive">+0.0109</h3>
                </article>
                <article class="stat-card">
                  <span>% Change</span>
                  <h3 class="positive">▲ +1.29%</h3>
                </article>
              </div>

              <div class="range-selector">
                <button>1D</button>
                <button>1W</button>
                <button class="active">1M</button>
                <button>3M</button>
                <button>1Y</button>
                <button>5Y</button>
              </div>
            </div>

            <div class="chart-container">
              <div class="chart-placeholder"> USD / EUR</div>
            </div>
          </div>

          <div class="tab-panel compare-panel hidden"></div>

          <div class="tab-panel favorites-panel hidden"></div>

          <div class="tab-panel log-panel hidden"></div>
        </section>
      </main>
    </div>

    <script src="./js/app.js"></script>
  </body>
</html>
